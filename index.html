<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bike Inventory</title>
<style>
:root{--bg:#f6f7f9;--card:#fff;--ink:#1b2430;--muted:#69748a;--line:#e6e9ef;--teal:#0f7c84;--accent:#1f3a5f;}
*{box-sizing:border-box}body{margin:0;font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{padding:18px 22px;background:var(--accent);color:#fff}
header h1{margin:0;font-size:18px;font-weight:600}header .sub{opacity:.8;font-size:12px;margin-top:3px}
.wrap{max-width:1200px;margin:0 auto;padding:18px 22px}
.cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 16px;min-width:120px}
.card .n{font-size:24px;font-weight:700}.card .l{font-size:12px;color:var(--muted)}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
input,select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:13px}
input[type=search]{flex:1;min-width:200px}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
th,td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--line);font-size:13px}
th{background:#eef1f6;color:var(--muted);font-weight:600;cursor:pointer;white-space:nowrap}
tr:last-child td{border-bottom:none}tbody tr{cursor:pointer}tbody tr:hover{background:#f0f6f7}
.pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600}
.s-available{background:#e3f4ec;color:#0a7d4f}.s-sold{background:#fde8e8;color:#b42318}
.s-draft,.s-waiting_for_info{background:#fff4e0;color:#9a6700}.s-approved,.s-ready_for_review{background:#e7eefc;color:#2b4eb8}
.s-reserved{background:#efe7fc;color:#6b3fb8}.muted{color:var(--muted)}
.drawer{position:fixed;top:0;right:0;width:min(560px,94vw);height:100%;background:#fff;border-left:1px solid var(--line);box-shadow:-8px 0 24px rgba(0,0,0,.08);transform:translateX(100%);transition:.2s;overflow:auto;padding:20px;z-index:10}
.drawer.open{transform:none}.drawer h2{margin:.2em 0}.drawer .close{float:right;cursor:pointer;font-size:20px;color:var(--muted)}
.kv{display:grid;grid-template-columns:130px 1fr;gap:4px 10px;margin:10px 0}.kv .k{color:var(--muted)}
.sec{margin-top:16px;border-top:1px solid var(--line);padding-top:12px}.sec h3{margin:0 0 6px;font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.warn{background:#fff4e0;border:1px solid #f3d28a;border-radius:8px;padding:8px 10px;font-size:12px;margin-top:8px}
pre{white-space:pre-wrap;background:#f6f7f9;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:12px}
.hist{font-size:12px;color:var(--muted)}
a{color:var(--teal)}
.tabs{display:flex;gap:8px;margin:0 0 14px}
.tab{padding:8px 16px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted)}
.tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.btn{padding:7px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-size:12px;color:var(--accent)}
.btn:hover{background:#f0f6f7}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:#eef1f6;color:var(--accent)}
.int{border:1px solid #f3d28a;background:#fffaf0;border-radius:8px;padding:8px 10px;font-size:12px}
.int .tag{display:inline-block;background:#9a6700;color:#fff;border-radius:4px;padding:1px 6px;font-size:10px;margin-right:6px}
.issue{background:#fde8e8;color:#b42318;border-radius:8px;padding:8px 10px;font-size:12px;margin-top:8px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1b2430;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:.2s;z-index:50}
.toast.show{opacity:.95}
</style></head>
<body>
<div id="lock" style="position:fixed;inset:0;background:#1f3a5f;display:flex;align-items:center;justify-content:center;z-index:100">
  <form id="lockform" style="background:#fff;padding:28px 26px;border-radius:12px;width:min(360px,90vw);box-shadow:0 10px 40px rgba(0,0,0,.3)">
    <h2 style="margin:0 0 4px;font-size:18px">&#128690; Bike Inventory</h2>
    <p style="margin:0 0 16px;color:#69748a;font-size:13px">Private dashboard &mdash; enter password to unlock</p>
    <input id="pw" type="password" placeholder="Password" autocomplete="current-password"
           style="width:100%;padding:10px;font-size:14px;border:1px solid #e6e9ef;border-radius:8px">
    <button type="submit" id="lockbtn"
           style="margin-top:12px;width:100%;padding:10px;font-size:14px;border:0;border-radius:8px;background:#0f7c84;color:#fff;cursor:pointer">Unlock</button>
    <p id="lockerr" style="display:none;margin:10px 0 0;color:#b42318;font-size:13px">Wrong password &mdash; try again.</p>
  </form>
</div>

const $ = s => document.querySelector(s);
let SEC='all', curId=null, sortK='submitted', sortDir=-1;
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function money(l){ if(l.price==null) return l.price_raw||'<span class="muted">—</span>'; return (l.currency? l.currency+' ':'')+Number(l.price).toLocaleString(); }
function pill(s){ return '<span class="pill s-'+s+'">'+esc(s).replace(/_/g,' ')+'</span>'; }
function wpill(w){ w=w||''; let cls='s-draft'; if(w==='Published')cls='s-available'; else if(w==='Sold')cls='s-sold'; else if(w==='Approved'||w==='Imported')cls='s-approved'; else if(/Fail|Reject/.test(w))cls='s-sold'; return '<span class="pill '+cls+'">'+esc(w)+'</span>'; }
function cov(l){ return {ig:!!l.pub.instagram, tt:!!l.pub.tiktok}; }
function coverage(l){ const c=cov(l);
  const ig=c.ig?'<a class="pill s-available" target="_blank" onclick="event.stopPropagation()" href="'+(l.pub.instagram.url||'#')+'">IG↗</a>':'<span class="pill s-sold">IG✗</span>';
  const tt=c.tt?'<a class="pill s-available" target="_blank" onclick="event.stopPropagation()" href="'+(l.pub.tiktok.url||'#')+'">TT↗</a>':'<span class="pill s-sold">TT✗</span>';
  return ig+' '+tt; }
function flagBadge(l){ const n=(l.flags?l.flags.length:0)+(l.issues?l.issues.length:0); if(!n) return ''; return '<span class="pill s-draft" title="'+esc((l.flags||[]).concat((l.issues||[]).map(i=>i.message)).join(' | '))+'">⚑ '+n+'</span>'; }

function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1400);}
function copy(text,label){navigator.clipboard.writeText(text||'').then(()=>toast((label||'Copied')+' ✓')).catch(()=>toast('Copy failed'));}
function socialText(l){const a=(l.mocks||[]).filter(m=>m.status==='approved').slice(-1)[0]; return a?a.public_text:(l.social_text||'');}
function cp(which){const l=DATA.listings.find(x=>x.id===curId); if(!l)return;
  if(which==='original')copy(l.original_text||'','Original text copied');
  else if(which==='clean')copy(l.clean_text||'','Clean text copied');
  else if(which==='social')copy(socialText(l),'Social text copied');         // NEVER includes internal/retail
  else if(which==='contact')copy((l.contact!==undefined?l.contact:'')||'','Contact copied');
  else if(which==='ref')copy(l.id,'Reference copied');}

function cards(){
  const s=DATA.summary; const c=$('#cards'); c.innerHTML='';
  const items=[['Total',s.total],['Bikes',s.bikes],['Equipment',s.equipment],['Available',s.available],['Sold',s.sold],['On both',s.both],['Missing info',s.needs_info],['Flagged',s.flagged]];
  items.forEach(([l,n])=>{c.innerHTML+='<div class="card"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';});
  const fsub=$('#fsub'); (DATA.subcategories||[]).forEach(s=>fsub.innerHTML+='<option>'+esc(s)+'</option>');
  const fb=$('#fbrand'); DATA.brands.forEach(b=>fb.innerHTML+='<option>'+esc(b)+'</option>');
  const fs=$('#fstatus'); (DATA.workflows||[]).forEach(s=>fs.innerHTML+='<option>'+esc(s)+'</option>');
}
function filtered(){
  const q=$('#q').value.toLowerCase(), sub=$('#fsub').value, br=$('#fbrand').value, st=$('#fstatus').value, cv=$('#fcov').value, v=$('#fval').value, fg=$('#fflag').value;
  let rows=DATA.listings.filter(l=>{
    if(SEC!=='all'&&l.section!==SEC) return false;
    const hay=[l.bike_name,l.model,l.brand,l.location,l.groupset,l.subcategory].join(' ').toLowerCase();
    if(q&&!hay.includes(q)) return false;
    if(sub&&l.subcategory!==sub) return false;
    if(br&&l.brand!==br) return false;
    if(st&&l.workflow!==st) return false;
    const c=cov(l);
    if(cv==='both'&&!(c.ig&&c.tt)) return false;
    if(cv==='ig_only'&&!(c.ig&&!c.tt)) return false;
    if(cv==='tiktok_only'&&!(c.tt&&!c.ig)) return false;
    if(v==='incomplete'&&(!l.issues||!l.issues.length)) return false;
    if(v==='complete'&&l.issues&&l.issues.length) return false;
    if(fg==='flagged'&&!((l.flags&&l.flags.length)||(l.issues&&l.issues.length))) return false;
    return true;
  });
  rows.sort((a,b)=>{let x=a[sortK],y=b[sortK]; x=x==null?'':x; y=y==null?'':y; return (x>y?1:x<y?-1:0)*sortDir;});
  return rows;
}
function render(){
  const rows=filtered(); const tb=$('#tbl tbody'); tb.innerHTML='';
  rows.forEach(l=>{
    const tr=document.createElement('tr'); tr.onclick=()=>openDrawer(l.id);
    const thumb=(l.images&&l.images.length&&l.images[0].path)?'<img src="'+l.images[0].path+'" style="width:32px;height:32px;object-fit:cover;border-radius:4px;vertical-align:middle;margin-right:6px" onerror="this.style.display=\'none\'">':'';
    tr.innerHTML='<td>'+thumb+'<b>'+(esc(l.bike_name)||'<span class=muted>untitled</span>')+'</b></td><td>'+esc(l.subcategory||'')+'</td>'+
      '<td>'+esc(l.size||'')+'</td><td>'+esc(l.year||'')+'</td><td>'+esc(l.groupset||'')+'</td>'+
      '<td>'+esc(l.location||'')+'</td><td>'+money(l)+'</td><td>'+wpill(l.workflow)+'</td>'+
      '<td>'+coverage(l)+'</td><td>'+flagBadge(l)+'</td>';
    tb.appendChild(tr);
  });
  $('#count').textContent=rows.length+' of '+DATA.listings.length+' listings'+(SEC!=='all'?' ('+SEC+')':'');
}
function openDrawer(id){
  const l=DATA.listings.find(x=>x.id===id); curId=id; const d=$('#drawer');
  let h='<span class="close" onclick="closeDrawer()">✕</span><h2>'+(esc(l.bike_name)||'Untitled')+'</h2>'+
        '<span class="badge">'+esc(l.section)+' · '+esc(l.subcategory||'?')+'</span> '+wpill(l.workflow);
  if(l.issues&&l.issues.length) h+='<div class="issue"><b>Missing / needs attention:</b><br>'+l.issues.map(i=>esc(i.message)).join('<br>')+'</div>';
  if(l.flags&&l.flags.length) h+='<div class="warn">⚑ '+l.flags.map(esc).join('<br>⚑ ')+'</div>';
  h+='<div class="btnrow">'+
     '<button class="btn" onclick="cp(\'original\')">Copy original</button>'+
     '<button class="btn" onclick="cp(\'clean\')">Copy clean</button>'+
     '<button class="btn" onclick="cp(\'social\')">Copy social</button>'+
     (l.contact!==undefined?'<button class="btn" onclick="cp(\'contact\')">Copy contact</button>':'')+
     '<button class="btn" onclick="cp(\'ref\')">Copy reference</button></div>';
  if(l.images&&l.images.length&&l.images[0].path) h+='<img src="'+l.images[0].path+'" style="width:100%;max-height:280px;object-fit:cover;border-radius:8px;margin:6px 0" onerror="this.style.display=\'none\'">';
  h+='<div class="sec"><h3>Original seller text</h3><pre>'+(l.original_text?esc(l.original_text):'<span class=muted>—</span>')+'</pre></div>';
  h+='<div class="sec"><h3>Clean Cyclist Hub version</h3><pre>'+esc(l.clean_text||'')+'</pre></div>';
  if(l.contact!==undefined) h+='<div class="kv"><div class="k">Contact</div><div>'+esc(l.contact||'—')+'</div>'+
     '<div class="k">Origin</div><div>'+esc(l.origin||'—')+'</div>'+
     (l.source_url?'<div class="k">Source</div><div><a href="'+esc(l.source_url)+'" target="_blank">post ↗</a></div>':'')+
     (l.seller_name?'<div class="k">Seller</div><div>'+esc(l.seller_name)+'</div>':'')+'</div>';
  h+='<div class="sec"><h3>Images ('+l.images.length+')</h3>'+
     (l.images.length? l.images.map(im=>'<div class="hist">'+(im.cover?'★ ':'')+esc(im.role||'')+' · '+esc(im.path)+(im.dup?' (dup)':'')+'</div>').join(''):'<span class="muted">none</span>')+'</div>';
  if(l.retail){const r=l.retail; h+='<div class="sec"><h3>Estimated original retail (internal)</h3>'+
     '<div class="int"><span class="tag">INTERNAL — never published</span>'+
     (r.amount!=null?('Est. '+esc(r.currency||'')+' '+Number(r.amount).toLocaleString()):'<i>'+esc(r.status||'pending')+'</i>')+
     (r.min!=null||r.max!=null?(' (range '+esc(r.min)+'–'+esc(r.max)+')'):'')+
     (r.confidence?' · confidence '+esc(r.confidence):'')+
     (r.market?' · '+esc(r.market):'')+(r.notes?'<br>'+esc(r.notes):'')+'</div></div>';}
  h+='<div class="sec"><h3>Publishing</h3><div class="kv">'+
     kv('Instagram',l.pub.instagram?(l.pub.instagram.status+(l.pub.instagram.url?' · '+l.pub.instagram.url:'')+(l.pub.instagram.post_id?' · id '+l.pub.instagram.post_id:'')):'—')+
     kv('TikTok',l.pub.tiktok?(l.pub.tiktok.status+(l.pub.tiktok.url?' · '+l.pub.tiktok.url:'')+(l.pub.tiktok.post_id?' · id '+l.pub.tiktok.post_id:'')):'—')+'</div></div>';
  if(l.mocks&&l.mocks.length) h+='<div class="sec"><h3>Mock posts / approvals</h3>'+
     l.mocks.map(m=>'<div class="hist">v'+m.version+' · '+esc(m.status)+(m.approved_by?' by '+esc(m.approved_by):'')+(m.snapshot_hash?' · '+m.snapshot_hash.slice(0,10):'')+'</div>').join('')+'</div>';
  if(l.approvals&&l.approvals.length) h+='<div class="sec"><h3>Approval history</h3>'+
     l.approvals.map(a=>'<div class="hist">'+esc(a.at)+' · '+esc(a.action)+(a.actor?' ('+esc(a.actor)+')':'')+(a.note?' — '+esc(a.note):'')+'</div>').join('')+'</div>';
  h+='<div class="sec"><h3>Status history</h3>'+l.history.map(x=>'<div class="hist">'+esc(x.at)+' · '+esc(x.from||'∅')+' → '+esc(x.to)+' ('+esc(x.by||'')+')'+(x.reason?' — '+esc(x.reason):'')+'</div>').join('')+'</div>';
  d.innerHTML=h; d.classList.add('open');
}
function kv(k,v){return '<div class="k">'+k+'</div><div>'+(v==null||v===''?'<span class=muted>—</span>':esc(String(v)))+'</div>';}
function closeDrawer(){$('#drawer').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});
document.querySelectorAll('#tabs .tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('#tabs .tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');SEC=t.dataset.sec;render();});
['q','fsub','fbrand','fstatus','fcov','fval','fflag'].forEach(id=>$('#'+id).addEventListener('input',render));
document.querySelectorAll('th[data-k]').forEach(th=>th.onclick=()=>{const k=th.dataset.k;sortDir=(sortK===k)?-sortDir:1;sortK=k;render();});

async function unlock(pw){
  const dec = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt: dec(ENC.salt), iterations: ENC.iters, hash:'SHA-256'},
    baseKey, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv: dec(ENC.iv)}, key, dec(ENC.ct));
  DATA = JSON.parse(new TextDecoder().decode(pt));
}
document.getElementById('lockform').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn=document.getElementById('lockbtn'), err=document.getElementById('lockerr');
  btn.disabled=true; btn.textContent='Unlocking…'; err.style.display='none';
  try{
    await unlock(document.getElementById('pw').value);
    document.getElementById('lock').remove();
    cards(); render();
  }catch(ex){
    err.style.display='block'; btn.disabled=false; btn.textContent='Unlock';
    document.getElementById('pw').select();
  }
});

</script></body></html>
